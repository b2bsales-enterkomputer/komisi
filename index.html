<html lang="id">

<meta charset="UTF-8">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #fff; --surface-2: #f0efe9; --border: #e0ddd4;
    --border-strong: #c8c5ba; --text: #1a1917; --text-sec: #6b6960;
    --text-muted: #9e9b92; --accent: #1d6fa4; --accent-bg: #e8f3fb;
    --success: #1d7a4e; --success-bg: #e6f5ee; --danger: #a32d2d;
    --danger-bg: #fcebeb; --warning: #8a5a0e; --warning-bg: #fdf3e0;
    --radius: 8px; --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "SF Mono", Consolas, monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 54px; position: sticky; top: 0; z-index: 20; }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: .08em; white-space: nowrap; }
  .logo span { color: var(--accent); }
  nav { display: flex; gap: 4px; border-left: 1px solid var(--border); padding-left: 14px; flex: 1; overflow-x: auto; }
  nav button, .icon-btn { background: transparent; border: 0; padding: 6px 12px; border-radius: var(--radius); color: var(--text-sec); cursor: pointer; font: inherit; font-size: 13px; white-space: nowrap; }
  nav button:hover, .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  nav button.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
  main { max-width: 1180px; margin: 0 auto; padding: 24px; }
  .page { display: none; } .page.active { display: block; }
  .login-shell { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .login-box { width: min(380px, 100%); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px; }
  .login-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .login-sub { color: var(--text-sec); font-size: 13px; margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sec); margin: 12px 0 5px; }
  input, select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font: inherit; font-size: 13px; outline: none; }
  input:focus, select:focus { border-color: var(--accent); }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); cursor: pointer; font: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; }
  .btn:hover { background: var(--surface-2); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: #165d8a; }
  .btn-danger { color: var(--danger); border-color: #efb3b3; background: #fff; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .section-title { font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text-sec); margin-bottom: 12px; }
  .upload-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
  .upload-box { background: var(--surface); border: 1.5px dashed var(--border-strong); border-radius: 10px; padding: 20px; text-align: center; position: relative; cursor: pointer; }
  .upload-box.has-file { border-style: solid; border-color: var(--success); background: var(--success-bg); }
  .upload-box input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { display: block; font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .upload-label { font-weight: 700; font-size: 13px; }
  .upload-hint, .upload-filename { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
  .upload-filename { color: var(--success); font-weight: 600; }
  .alert { padding: 10px 12px; border-radius: var(--radius); border: 1px solid; font-size: 13px; margin-bottom: 12px; }
  .alert-info { background: var(--accent-bg); color: var(--accent); border-color: #b5d4f4; }
  .alert-warning { background: var(--warning-bg); color: var(--warning); border-color: #f0c870; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
  .stat-value { font-size: 20px; font-weight: 700; }
  .success { color: var(--success); } .danger { color: var(--danger); } .warning { color: var(--warning); }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 18px; }
  .table-header { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .table-title { font-weight: 700; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th { background: var(--surface-2); color: var(--text-sec); padding: 8px 10px; text-align: left; text-transform: uppercase; letter-spacing: .04em; font-size: 11px; white-space: nowrap; }
  td { padding: 8px 10px; border-top: 1px solid var(--surface-2); vertical-align: top; }
  tr:hover td { background: var(--accent-bg); }
  .rp, .nota { font-variant-numeric: tabular-nums; }
  .nota { font-family: var(--mono); font-size: 11px; color: var(--text-sec); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-sec); }
  .badge-paid { background: var(--success-bg); color: var(--success); border-color: #9fd8bb; }
  .badge-due { background: var(--danger-bg); color: var(--danger); border-color: #f0a0a0; }
  .badge-unknown { background: var(--warning-bg); color: var(--warning); border-color: #f0c870; }
  .empty { text-align: center; color: var(--text-muted); padding: 42px 12px; font-size: 13px; }
  .hidden { display: none !important; }
  @media (max-width: 720px) {
    header { padding: 0 12px; }
    main { padding: 16px; }
    .upload-grid { grid-template-columns: 1fr; }
    .table-header { align-items: stretch; }
    .table-header input, .table-header select { width: 100%; }
  }
</style>
</head>
<body>
<div id="login-view" class="login-shell">
  <div class="login-box">
    <div class="login-title">EK Komisi</div>
    <div class="login-sub">Login dengan username dan password yang dibuat admin.</div>
    <div id="login-alert"></div>
    <label>Username</label>
    <input id="login-username" autocomplete="username" placeholder="contoh: fifi">
    <label>Password</label>
    <input id="login-password" type="password" autocomplete="current-password">
    <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="login()">Login</button>
  </div>
</div>

<div id="app-view" class="hidden">
  <header>
    <div class="logo">EK <span>KOMISI</span></div>
    <nav>
      <button class="active" data-page="dashboard" onclick="showPage('dashboard', this)">Dashboard</button>
      <button data-page="periode" onclick="showPage('periode', this)">Per Periode</button>
      <button data-page="catalog" onclick="showPage('catalog', this)">Item Katalog</button>
      <button id="admin-tab" data-page="admin" onclick="showPage('admin', this)">Admin Upload</button>
    </nav>
    <button class="icon-btn" onclick="logout()">Logout</button>
  </header>

  <main>
    <div id="app-alert"></div>

    <section id="page-dashboard" class="page active"></section>
    <section id="page-periode" class="page"></section>
    <section id="page-catalog" class="page"></section>

    <section id="page-admin" class="page">
      <div class="section-title">Upload data</div>
      <div class="upload-grid">
        <div class="upload-box" id="box-komisi">
          <input type="file" id="inp-komisi" accept=".xlsx" multiple onchange="handleKomisiFiles(this.files)">
          <span class="upload-icon">XLSX</span>
          <div class="upload-label">Laporan Komisi</div>
          <div class="upload-hint">Bisa multi-file</div>
          <div class="upload-filename" id="fn-komisi"></div>
        </div>
        <div class="upload-box" id="box-sales">
          <input type="file" id="inp-sales" accept=".csv" multiple onchange="handleSalesFiles(this.files)">
          <span class="upload-icon">CSV</span>
          <div class="upload-label">Laporan Penjualan</div>
          <div class="upload-hint">Bisa multi-file</div>
          <div class="upload-filename" id="fn-sales"></div>
        </div>
      </div>
      <div class="row">
        <button class="btn btn-primary" id="btn-upload" onclick="analyzeAndUpload()" disabled>Analisa & Upload</button>
        <button class="btn" onclick="rebuildGlobalCatalog()">Rebuild Katalog Global</button>
        <button class="btn btn-danger" onclick="deleteAllCommissionRows()">Hapus Semua Data Komisi</button>
      </div>
      <div style="margin-top:16px" class="alert alert-warning">
        Upload ulang file yang sama aman: baris dengan nota, marketing, item, qty, point, dan subtotal yang sama akan dilewati.
      </div>
    </section>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://fmftvtdewzvkzrxmjdyg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtZnR2dGRld3p2a3pyeG1qZHlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4ODAyNzMsImV4cCI6MjA5ODQ1NjI3M30.UW7_TWBvdNN4i8BRWKHUFyOXjarGL-PNx8-uIcYh6_k';
const USER_EMAILS = {
  admin: 'admin@ek.local',
  fifi: 'fifi@ek.local',
  rikaaa: 'rikaaa@ek.local',
  vernanda: 'vernanda@ek.local',
  william: 'william@ek.local'
};

let sb = null;
let session = null;
let profile = null;
let salesMap = {};
let komisiData = [];

// State per-halaman
let periodList = [];          // [{period, sort_date, total, paid, due}]
let activePeriod = null;      // periode yang sedang dibuka
let activePeriodRows = [];    // rows untuk periode aktif
let globalCatalogRows = [];
let catalogView = 'global';
let catalogSearch = '';
let catalogSortCol = 'total_subtotal';
let catalogSortDir = 1;

const fmt = n => 'Rp' + Math.round(Number(n) || 0).toLocaleString('id-ID');
const fmtNum = n => Math.round(Number(n) || 0).toLocaleString('id-ID');

function client() {
  if (!sb) sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return sb;
}

function escapeHtml(v) {
  return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function normalizeKey(v) { return String(v ?? '').trim().toLowerCase().replace(/\s+/g, ' '); }
function normalizeRow(row) { const o = {}; Object.entries(row||{}).forEach(([k,v]) => o[normalizeKey(k)] = v); return o; }
function readField(row, names, fallback = '') {
  for (const n of names) { const v = row[normalizeKey(n)]; if (v !== undefined && v !== null && String(v).trim() !== '') return v; }
  return fallback;
}
function parseMoney(value) {
  if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
  let t = String(value ?? '').trim().replace(/rp/gi,'').replace(/\s/g,'');
  if (!t) return 0;
  if (t.includes('.') && t.includes(',')) t = t.replace(/\./g,'').replace(',','.');
  else if (t.includes('.')) t = t.replace(/\./g,'');
  else t = t.replace(',','.');
  const p = Number(t.replace(/[^\d.-]/g,''));
  return Number.isFinite(p) ? p : 0;
}
function normalizeStatus(v) {
  const s = String(v ?? '').trim().toLowerCase();
  if (!s) return 'unknown';
  if (s.includes('due')||s.includes('unpaid')||s.includes('partial')||s.includes('belum')) return 'due';
  if (s.includes('paid')||s.includes('lunas')) return 'paid';
  if (s.includes('cancel')||s.includes('batal')) return 'cancel';
  return s;
}
const MONTH_INDEX = {jan:0,januari:0,feb:1,februari:1,mar:2,maret:2,apr:3,april:3,mei:4,may:4,jun:5,juni:5,jul:6,juli:6,agu:7,agustus:7,sep:8,september:8,okt:9,oktober:9,nov:10,november:10,des:11,desember:11};
function periodSortDate(period) {
  const text = String(period ?? '').toLowerCase().replace(/\([^)]*\)/g,' ').replace(/_/g,' ');
  const year = Number((text.match(/\b(20\d{2})\b/)||[])[1]) || new Date().getFullYear();
  const monthNames = Object.keys(MONTH_INDEX).join('|');
  const re = new RegExp('(\\d{1,2})\\s*(?:-|s\\/d|sd|to|hingga|sampai)?\\s*(\\d{1,2})?\\s*('+monthNames+')\\s*(20\\d{2})?','gi');
  const dates = []; let m;
  while ((m = re.exec(text)) !== null) {
    const day = Number(m[2]||m[1]), month = MONTH_INDEX[m[3].toLowerCase()], yyyy = Number(m[4])||year;
    if (day>=1&&day<=31&&month!==undefined) dates.push(new Date(yyyy,month,day));
  }
  if (!dates.length) return null;
  dates.sort((a,b) => b-a);
  return dates[0].toISOString().slice(0,10);
}
function periodSortValue(p) { const d = periodSortDate(p); return d ? new Date(d).getTime() : Number.NEGATIVE_INFINITY; }
function sortPeriodsLatestFirst(periods) {
  return [...periods].sort((a,b) => periodSortValue(b)-periodSortValue(a)||String(b).localeCompare(String(a),'id-ID',{numeric:true}));
}
function makeRowKey(row) {
  return [row.nota,row.marketing_name,row.item_name,row.qty,row.point,row.subtotal].map(v=>String(v??'').trim().toLowerCase()).join('|');
}
function csvCell(v) { return '"'+String(v??'').replace(/"/g,'""')+'"'; }
function alertBox(target, type, message) {
  const el = document.getElementById(target);
  if (el) el.innerHTML = message ? `<div class="alert alert-${type}">${escapeHtml(message)}</div>` : '';
}
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if (btn) btn.classList.add('active');
  // Load data on-demand saat tab dibuka
  if (name === 'periode') renderPeriodePage();
  if (name === 'catalog') renderCatalog();
  if (name === 'dashboard') renderDashboard();
}

// ---- AUTH ----

async function login() {
  try {
    const username = document.getElementById('login-username').value.trim().toLowerCase();
    const password = document.getElementById('login-password').value;
    const email = USER_EMAILS[username] || `${username}@ek.local`;
    const { data, error } = await client().auth.signInWithPassword({ email, password });
    if (error) throw error;
    session = data.session;
    await loadProfile();
    await enterApp();
  } catch(err) { alertBox('login-alert','warning',err.message); }
}

async function logout() { await client().auth.signOut(); location.reload(); }

async function loadProfile() {
  const { data: userData } = await client().auth.getUser();
  const { data, error } = await client().from('profiles').select('*').eq('id', userData.user.id).single();
  if (error) throw error;
  profile = data;
}

async function enterApp() {
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('app-view').classList.remove('hidden');
  document.getElementById('admin-tab').classList.toggle('hidden', profile.role !== 'admin');
  if (profile.role !== 'admin') document.getElementById('page-admin').classList.add('hidden');
  // Load ringan: hanya period list + catalog global
  await Promise.all([loadPeriodList(), loadGlobalCatalog()]);
  renderDashboard();
}

// ---- LOAD DATA RINGAN ----

// Fetch daftar periode + aggregate stats (bukan raw rows)
async function loadPeriodList() {
  alertBox('app-alert','info','Memuat daftar periode...');

  // Query distinct period + aggregate dari commission_rows
  // Filter by marketing kalau bukan admin
  let query = client()
    .from('commission_rows')
    .select('period, payment_status, subtotal');

  if (profile.role !== 'admin' && profile.marketing_name) {
    query = query.eq('marketing_name', profile.marketing_name);
  }

  const { data, error } = await query;
  if (error) { alertBox('app-alert','warning',error.message); return; }

  // Aggregate di browser (data kecil: hanya 3 kolom × N rows)
  const map = {};
  (data || []).forEach(r => {
    if (!map[r.period]) map[r.period] = { period: r.period, total: 0, paid: 0, due: 0 };
    const sub = Number(r.subtotal || 0);
    map[r.period].total += sub;
    if (r.payment_status === 'paid') map[r.period].paid += sub;
    if (r.payment_status === 'due') map[r.period].due += sub;
  });

  periodList = sortPeriodsLatestFirst(Object.keys(map)).map(p => map[p]);
  alertBox('app-alert','','');
}

// Fetch catalog global dari catalog_items (sudah aggregate di Supabase)
async function loadGlobalCatalog() {
  const { data, error } = await client()
    .from('catalog_items')
    .select('*')
    .order('total_subtotal', { ascending: false });

  if (error) { console.warn('Gagal load catalog_items:', error); return; }

  globalCatalogRows = (data || []).map(row => {
    const periodSet = new Set(Array.isArray(row.periods) ? row.periods : []);
    return {
      item_name: row.item_name,
      point: Number(row.point) || 0,
      total_qty: Number(row.total_qty) || 0,
      total_subtotal: Number(row.total_subtotal) || 0,
      count: Number(row.count) || 0,
      periode_count: periodSet.size || Number(row.periode_count) || 0,
      periodes: periodSet
    };
  });
}

// Fetch rows untuk 1 periode saja (on-demand)
async function loadPeriodRows(period) {
  alertBox('app-alert','info',`Memuat detail ${period}...`);

  let query = client()
    .from('commission_rows')
    .select('*')
    .eq('period', period)
    .order('nota');

  if (profile.role !== 'admin' && profile.marketing_name) {
    query = query.eq('marketing_name', profile.marketing_name);
  }

  const { data, error } = await query;
  if (error) { alertBox('app-alert','warning',error.message); return []; }
  alertBox('app-alert','','');
  return data || [];
}

// ---- RENDER DASHBOARD ----
function renderDashboard() {
  const total = periodList.reduce((s,p) => s+p.total, 0);
  const paid  = periodList.reduce((s,p) => s+p.paid, 0);
  const due   = periodList.reduce((s,p) => s+p.due, 0);
  const name  = profile.role === 'admin' ? 'Semua Sales' : (profile.display_name || profile.marketing_name || '');

  let periodsHtml = '';
  periodList.forEach(p => {
    periodsHtml += `
      <tr style="cursor:pointer" onclick="openPeriodFromDashboard('${escapeHtml(p.period).replace(/'/g,"\\'")}')">
        <td>${escapeHtml(p.period)}</td>
        <td class="rp">${fmt(p.total)}</td>
        <td class="rp success">${fmt(p.paid)}</td>
        <td class="rp danger">${fmt(p.due)}</td>
      </tr>`;
  });

  document.getElementById('page-dashboard').innerHTML = `
    <div class="section-title">Dashboard — ${escapeHtml(name)}</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Total Semua Periode</div><div class="stat-value">${fmt(total)}</div></div>
      <div class="stat-card"><div class="stat-label">Total Cair (paid)</div><div class="stat-value success">${fmt(paid)}</div></div>
      <div class="stat-card"><div class="stat-label">Total Ditahan (due)</div><div class="stat-value danger">${fmt(due)}</div></div>
      <div class="stat-card"><div class="stat-label">Jumlah Periode</div><div class="stat-value">${periodList.length}</div></div>
    </div>
    <div class="table-wrap">
      <div class="table-header"><div class="table-title">Ringkasan per Periode</div><div style="font-size:12px;color:var(--text-muted)">Klik periode untuk lihat detail</div></div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Periode</th><th>Total</th><th>Paid</th><th>Due</th></tr></thead>
        <tbody>${periodsHtml || '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:24px">Belum ada data.</td></tr>'}</tbody>
      </table></div>
    </div>
  `;
}

function openPeriodFromDashboard(period) {
  // Pindah ke tab Per Periode dan langsung buka periode tersebut
  const btn = document.querySelector('nav button[data-page="periode"]');
  showPage('periode', btn);
  openPeriod(period);
}

// ---- RENDER PER PERIODE ----
function renderPeriodePage() {
  let optionsHtml = periodList.map(p =>
    `<option value="${escapeHtml(p.period)}" ${p.period === activePeriod ? 'selected' : ''}>${escapeHtml(p.period)}</option>`
  ).join('');

  const statsHtml = activePeriod ? renderPeriodeStats() : '';
  const tableHtml = activePeriod && activePeriodRows.length ? renderRowsTable('Detail — ' + activePeriod, activePeriodRows) : '';

  document.getElementById('page-periode').innerHTML = `
    <div class="section-title">Per Periode</div>
    <div class="row" style="margin-bottom:14px">
      <select id="period-select" onchange="openPeriod(this.value)" style="width:auto;min-width:240px">
        <option value="">— Pilih periode —</option>
        ${optionsHtml}
      </select>
    </div>
    <div id="periode-stats">${statsHtml}</div>
    <div id="periode-table">${tableHtml}</div>
  `;
}

function renderPeriodeStats() {
  const p = periodList.find(p => p.period === activePeriod);
  if (!p) return '';
  const notaDue = [...new Set(activePeriodRows.filter(r => r.payment_status === 'due').map(r => r.nota))];
  return `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${fmt(p.total)}</div></div>
      <div class="stat-card"><div class="stat-label">Cair (paid)</div><div class="stat-value success">${fmt(p.paid)}</div></div>
      <div class="stat-card"><div class="stat-label">Ditahan (due)</div><div class="stat-value danger">${fmt(p.due)}</div></div>
    </div>
    ${notaDue.length ? `<div class="alert alert-warning"><b>Nota ditahan (${notaDue.length}):</b> ${notaDue.map(escapeHtml).join(', ')}</div>` : ''}
  `;
}

async function openPeriod(period) {
  if (!period) return;
  activePeriod = period;
  activePeriodRows = await loadPeriodRows(period);
  // Update stats + tabel tanpa re-render seluruh halaman
  const statsEl = document.getElementById('periode-stats');
  const tableEl = document.getElementById('periode-table');
  const selectEl = document.getElementById('period-select');
  if (statsEl) statsEl.innerHTML = renderPeriodeStats();
  if (tableEl) tableEl.innerHTML = activePeriodRows.length ? renderRowsTable('Detail — ' + activePeriod, activePeriodRows) : '<div class="empty">Tidak ada data untuk periode ini.</div>';
  if (selectEl) selectEl.value = period;
}

// ---- RENDER TABEL ROWS ----
function renderRowsTable(title, rows) {
  if (!rows.length) return '<div class="empty">Belum ada data.</div>';
  const isAdmin = profile.role === 'admin';
  return `
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">${escapeHtml(title)}</div>
        <input style="width:200px" placeholder="Cari nota / barang..." oninput="filterTable('rows-tbody', this.value)">
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr>
          ${isAdmin ? '<th>Marketing</th>' : ''}
          <th>Nota</th><th>Nama Barang</th><th>Qty</th><th>Point</th><th>Subtotal</th><th>Status</th>
        </tr></thead>
        <tbody id="rows-tbody">
          ${rows.map(r => `<tr>
            ${isAdmin ? `<td>${escapeHtml(r.marketing_name)}</td>` : ''}
            <td><span class="nota">${escapeHtml(r.nota)}</span></td>
            <td style="max-width:280px;word-break:break-word">${escapeHtml(r.item_name)}</td>
            <td>${fmtNum(r.qty)}</td>
            <td>${fmtNum(r.point)}</td>
            <td class="rp">${fmt(r.subtotal)}</td>
            <td>${statusBadge(r.payment_status)}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>
  `;
}

function filterTable(tbodyId, val) {
  const tbody = document.getElementById(tbodyId);
  if (!tbody) return;
  const v = val.toLowerCase();
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.style.display = !v || tr.textContent.toLowerCase().includes(v) ? '' : 'none';
  });
}

// ---- RENDER CATALOG ----
function renderCatalog() {
  const sourceRows = globalCatalogRows; // selalu global
  const filtered = sourceRows.filter(r =>
    !catalogSearch || r.item_name.toLowerCase().includes(catalogSearch.toLowerCase())
  );
  const sorted = sortCatalogRows(filtered);

  document.getElementById('page-catalog').innerHTML = `
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">Semua Item Berkomisi (${sourceRows.length} item)</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
          <input style="width:220px" placeholder="Cari nama item..." value="${escapeHtml(catalogSearch)}" oninput="catalogSearchChange(this.value)">
          <button class="btn" onclick="exportCatalogCsv()">Export CSV</button>
        </div>
      </div>
      <div style="overflow-x:auto">${renderCatalogTable(sorted)}</div>
    </div>
  `;
}

function renderCatalogTable(rows) {
  if (!rows.length) return '<div class="empty">Belum ada data katalog. Jalankan Rebuild Katalog Global di Admin.</div>';
  return `
    <table>
      <thead><tr>
        <th>#</th>
        <th onclick="setCatalogSort('item_name')" style="cursor:pointer">Nama Barang ${catalogSortMark('item_name')}</th>
        <th onclick="setCatalogSort('point')" style="cursor:pointer">Point/unit ${catalogSortMark('point')}</th>
        <th onclick="setCatalogSort('total_qty')" style="cursor:pointer">Total Qty ${catalogSortMark('total_qty')}</th>
        <th onclick="setCatalogSort('total_subtotal')" style="cursor:pointer">Total Komisi ${catalogSortMark('total_subtotal')}</th>
        <th onclick="setCatalogSort('periode_count')" style="cursor:pointer">Muncul di ${catalogSortMark('periode_count')}</th>
      </tr></thead>
      <tbody>
        ${rows.map((r, i) => `<tr>
          <td>${i+1}</td>
          <td style="font-size:12px">${escapeHtml(r.item_name)}</td>
          <td>${fmtNum(r.point)}</td>
          <td>${fmtNum(r.total_qty)}</td>
          <td class="rp"><b>${fmt(r.total_subtotal)}</b></td>
          <td><span class="badge">${r.periode_count} periode</span></td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function sortCatalogRows(rows) {
  return [...rows].sort((a, b) => {
    const av = a[catalogSortCol], bv = b[catalogSortCol];
    if (typeof av === 'string' || typeof bv === 'string')
      return catalogSortDir * String(av??'').localeCompare(String(bv??''),'id-ID',{numeric:true});
    return catalogSortDir * ((Number(bv)||0)-(Number(av)||0));
  });
}
function catalogSortMark(col) { if (catalogSortCol !== col) return ''; return catalogSortDir === 1 ? '↓' : '↑'; }
function catalogSearchChange(v) { catalogSearch = v; renderCatalog(); }
function setCatalogSort(col) {
  if (catalogSortCol === col) catalogSortDir *= -1;
  else { catalogSortCol = col; catalogSortDir = col === 'item_name' ? -1 : 1; }
  renderCatalog();
}

function statusBadge(status) {
  if (status === 'paid') return '<span class="badge badge-paid">paid</span>';
  if (status === 'due') return '<span class="badge badge-due">due</span>';
  return '<span class="badge badge-unknown">'+escapeHtml(status||'unknown')+'</span>';
}

// ---- UPLOAD (admin) ----
function handleKomisiFiles(files) {
  const xlsxFiles = Array.from(files||[]).filter(f => f.name.toLowerCase().endsWith('.xlsx'));
  komisiData = []; let loaded = 0;
  if (!xlsxFiles.length) return;
  xlsxFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      komisiData.push({ filename: file.name, rows: XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' }).map(normalizeRow) });
      if (++loaded === xlsxFiles.length) {
        document.getElementById('fn-komisi').textContent = `${xlsxFiles.length} file dimuat`;
        document.getElementById('box-komisi').classList.add('has-file');
        checkUploadReady();
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function handleSalesFiles(files) {
  const csvFiles = Array.from(files||[]).filter(f => f.name.toLowerCase().endsWith('.csv'));
  salesMap = {}; let loaded = 0;
  if (!csvFiles.length) return;
  csvFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      importSalesCsvText(e.target.result);
      if (++loaded === csvFiles.length) {
        document.getElementById('fn-sales').textContent = `${csvFiles.length} file dimuat (${Object.keys(salesMap).length} nota)`;
        document.getElementById('box-sales').classList.add('has-file');
        checkUploadReady();
      }
    };
    reader.readAsText(file, 'UTF-8');
  });
}

function checkUploadReady() {
  document.getElementById('btn-upload').disabled = !(komisiData.length && Object.keys(salesMap).length);
}

function parseCSV(text) {
  const rows = []; let row = [], value = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (ch === '"' && inQuotes && next === '"') { value += '"'; i++; }
    else if (ch === '"') inQuotes = !inQuotes;
    else if (ch === ',' && !inQuotes) { row.push(value); value = ''; }
    else if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(value); if (row.some(c => String(c).trim())) rows.push(row);
      row = []; value = '';
    } else value += ch;
  }
  row.push(value); if (row.some(c => String(c).trim())) rows.push(row);
  return rows;
}

function importSalesCsvText(text) {
  const csvRows = parseCSV(text);
  if (!csvRows.length) return;
  const headers = csvRows[0].map(normalizeKey);
  csvRows.slice(1).forEach(cols => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = String(cols[i]??'').trim());
    const ref = obj.reference_no || obj.nota || obj['no nota'] || obj.invoice_no;
    if (ref) salesMap[String(ref).toUpperCase().trim()] = {
      sale_status: normalizeStatus(obj.sale_status),
      payment_status: normalizeStatus(obj.payment_status)
    };
  });
}

async function analyzeAndUpload() {
  if (profile.role !== 'admin') return;
  const parsed = [], seen = new Set();
  const batchId = crypto.randomUUID();
  let duplicateInUpload = 0;

  komisiData.forEach(({ filename, rows }) => {
    const period = filename.replace(/CLAIM_AN_PERIODE_/i,'').replace(/\.xlsx$/i,'').replace(/_/g,' ').trim();
    const sortDate = periodSortDate(period);
    rows.forEach(row => {
      const marketing = String(readField(row,['Nama Marketing','Marketing'])).trim();
      const nota = String(readField(row,['Nota','No Nota','Reference No'])).toUpperCase().trim();
      const item = String(readField(row,['Nama Barang','Barang','Item'])).trim();
      const qty = parseMoney(readField(row,['Qty','Quantity'],1)) || 1;
      const point = parseMoney(readField(row,['Point','Poin'],0));
      const subtotal = parseMoney(readField(row,['Subtotal','Sub Total','Komisi','Total Komisi'],0));
      if (!marketing||!nota||!item||nota.length<4) return;
      const salesInfo = salesMap[nota] || null;
      const saleStatus = salesInfo ? salesInfo.sale_status : 'unknown';
      const paymentStatus = saleStatus === 'cancel' ? 'cancel' : (salesInfo ? salesInfo.payment_status : 'unknown');
      const base = { period, filename, marketing_name: marketing, nota, item_name: item, qty, point, subtotal, payment_status: paymentStatus, sale_status: saleStatus };
      const rowKey = makeRowKey(base);
      if (seen.has(rowKey)) { duplicateInUpload++; return; }
      seen.add(rowKey);
      parsed.push({ ...base, row_key: rowKey, upload_batch_id: batchId, period_sort_date: sortDate, created_by: session.user.id });
    });
  });

  if (!parsed.length) { alertBox('app-alert','warning','Tidak ada baris valid untuk diupload.'); return; }

  alertBox('app-alert','info',`Mengupload ${parsed.length} baris...`);
  let inserted = 0;
  for (let i = 0; i < parsed.length; i += 500) {
    const { data, error } = await client().from('commission_rows').upsert(parsed.slice(i,i+500), { onConflict: 'row_key', ignoreDuplicates: true }).select('id');
    if (error) { alertBox('app-alert','warning',error.message); return; }
    inserted += (data||[]).length;
  }
  try {
    await refreshGlobalCatalogFromDatabase();
    await loadPeriodList();
    await loadGlobalCatalog();
    renderDashboard();
    alertBox('app-alert','info',`Upload selesai. ${inserted} baris baru. ${duplicateInUpload} duplikat dilewati.`);
  } catch(err) {
    alertBox('app-alert','warning',`Data masuk tapi katalog gagal diperbarui: ${err.message}`);
  }
}

async function refreshGlobalCatalogFromDatabase() {
  if (profile.role !== 'admin') return;
  alertBox('app-alert','info','Rebuild katalog — mengambil semua data...');

  // Aggregate langsung di Supabase: hanya select kolom yang diperlukan
  const PAGE_SIZE = 1000;
  let allRows = [], from = 0, hasMore = true;
  while (hasMore) {
    const { data, error } = await client()
      .from('commission_rows')
      .select('item_name, point, qty, subtotal, period')
      .range(from, from + PAGE_SIZE - 1);
    if (error) throw error;
    allRows = allRows.concat(data||[]);
    hasMore = (data||[]).length === PAGE_SIZE;
    from += PAGE_SIZE;
  }

  // Aggregate di browser
  const map = {};
  allRows.forEach(r => {
    const k = r.item_name;
    if (!map[k]) map[k] = { item_name: k, point: Number(r.point)||0, total_qty: 0, total_subtotal: 0, count: 0, periodes: new Set() };
    map[k].total_qty += Number(r.qty)||0;
    map[k].total_subtotal += Number(r.subtotal)||0;
    map[k].count++;
    if (r.period) map[k].periodes.add(r.period);
  });

  const rows = Object.values(map).map(r => ({
    item_name: r.item_name, point: r.point, total_qty: r.total_qty,
    total_subtotal: r.total_subtotal, count: r.count,
    periode_count: r.periodes.size, periods: Array.from(r.periodes),
    updated_at: new Date().toISOString()
  }));

  await client().from('catalog_items').delete().neq('item_name','');
  for (let i = 0; i < rows.length; i += 500) {
    const { error } = await client().from('catalog_items').upsert(rows.slice(i,i+500), { onConflict: 'item_name' });
    if (error) throw error;
  }
}

async function rebuildGlobalCatalog() {
  try {
    alertBox('app-alert','info','Rebuild katalog global...');
    await refreshGlobalCatalogFromDatabase();
    await loadGlobalCatalog();
    renderCatalog();
    alertBox('app-alert','info','Katalog global selesai dibangun ulang.');
  } catch(err) { alertBox('app-alert','warning',err.message); }
}

async function deleteAllCommissionRows() {
  if (profile.role !== 'admin') return;
  if (!confirm('Hapus semua data komisi dari Supabase?')) return;
  const { error } = await client().from('commission_rows').delete().neq('id','00000000-0000-0000-0000-000000000000');
  if (error) { alertBox('app-alert','warning',error.message); return; }
  await client().from('catalog_items').delete().neq('item_name','');
  periodList = []; globalCatalogRows = []; activePeriod = null; activePeriodRows = [];
  renderDashboard();
}

function exportCatalogCsv() {
  const filtered = globalCatalogRows.filter(r => !catalogSearch || r.item_name.toLowerCase().includes(catalogSearch.toLowerCase()));
  const sorted = sortCatalogRows(filtered);
  if (!sorted.length) return;
  const headers = ['Nama Barang','Point/Unit','Total Qty','Total Komisi','Jumlah Baris','Jumlah Periode','Periode'];
  const lines = [headers.map(csvCell).join(',')];
  sorted.forEach(r => lines.push([r.item_name,r.point,r.total_qty,r.total_subtotal,r.count,r.periode_count,Array.from(r.periodes||[]).join('; ')].map(csvCell).join(',')));
  const blob = new Blob(['\uFEFF'+lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'ek_katalog_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const { data } = await client().auth.getSession();
    if (data.session) { session = data.session; await loadProfile(); await enterApp(); }
  } catch(err) { alertBox('login-alert','warning',err.message); }
});
